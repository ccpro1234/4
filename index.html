<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat 16 Patterns AI Master</title>

<style>
:root{
 --bg-color:#0a0a0a;
 --panel-bg:#161616;
--p-color:#2196f3;  /* 🔵 น้ำเงิน P */
--b-color:#f44336;  /* 🔴 แดง B */
 --t-color:#4caf50;
 --text-color:#ffffff;
 --border-color:#333;
}

/* 🔥 BODY ตัวเดียว วางตรงนี้ */
body{
 background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
 color:var(--text-color);
 font-family:sans-serif;
 margin:0;
 padding:20px;
 display:flex;
 justify-content:center;
 position:relative;
 overflow-x:auto;
}

/* ===== ต่อด้วย CSS อื่นทั้งหมด ===== */
.layout{display:flex;gap:20px;max-width:1400px;width:100%}

body::before{
 pointer-events:none; /* 🔥 กันบังคลิก */
}

/* LEFT */
.left-panel{
    width:320px;
    max-width:100%;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.box{
 background:var(--panel-bg);
 border:1px solid var(--border-color);
 border-radius:8px;
 padding:10px;
}

.header-title{
 text-align:center;
 font-size:12px;
 color:#888;
 margin-bottom:10px;
}

.bead-scroll-area{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    background:#000;
    border:1px solid #333;
}

.bead-grid{
    display:grid;
    grid-auto-flow:column;
    gap:2px;
    padding:4px;
    justify-content:start;
    width:max-content;
}

@media (max-width:768px){
    .bead-grid{
        grid-template-rows:repeat(6,24px);
        grid-auto-columns:24px;
    }
}

@media (min-width:769px){
    .bead-grid{
        grid-template-rows:repeat(6,38px);
        grid-auto-columns:38px;
    }
}

.bead{
    border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #444;
}

.b-p{background:var(--p-color)}
.b-b{background:var(--b-color)}
.b-t{background:var(--t-color);color:#000}
.b-empty{border-color:#222}

/* STATS */
.stat-row{
 display:flex;
 justify-content:space-around;
 font-weight:bold;
}

/* RIGHT */
.controls{display:flex;gap:10px;justify-content:center}

.btn{
 padding:10px 20px;
 border:none;
 border-radius:6px;
 cursor:pointer;
 color:#fff;
 font-weight:bold;
}

.btn-p{background:var(--p-color)}
.btn-b{background:var(--b-color)}
.btn-t{background:var(--t-color);color:#000}

.patterns-container{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:8px;
}
.pattern-row{
  background:#161616;
  border:1px solid #333;
  border-radius:6px;
  padding:8px;
  display:grid;
  grid-template-columns:60px 1fr 40px;
  align-items:center;
  gap:6px;
}
/* ===============================
   MOBILE LAYOUT
================================ */

@media (max-width:768px){

    body{
        padding:8px;
    }

    .layout{
        display:block;
        width:100%;
    }

    .left-panel{
        width:100%;
        margin-bottom:12px;
    }

    .right-panel{
        width:100%;
    }

    .box{
        width:100%;
        box-sizing:border-box;
    }

    .bead-scroll-area{
        width:100%;
        overflow-x:auto;
        overflow-y:hidden;
    }

    .bead-grid{
        width:max-content;
    }

    /* ⭐ เพิ่มตรงนี้ */
    .controls{
        flex-wrap:wrap;
    }

    .patterns-container{
        grid-template-columns:1fr;
    }

}
/* =========================
   📱 MOBILE FRIENDLY (เพิ่ม)
   ========================= */
@media (max-width: 768px){
  .pattern-row{
    grid-template-columns:70px 1fr 60px 60px;
    font-size:14px;
    padding:10px;
  }
  #pct{ font-weight:bold; font-size:14px; }
  .pred-circle{ width:34px; height:34px; font-size:14px; }
  .ai-floating-widget {
    top: 10px !important;
    right: 10px !important;
    width: 150px !important;
    padding: 10px !important;
  }
  .ai-pred-val { font-size: 24px !important; }
}

/* ===== 🌌 PREMIUM BACKGROUND ===== */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background:linear-gradient(45deg,#0ea5e9,#6366f1,#ec4899,#0ea5e9);
 animation:bgMove 12s linear infinite;
 opacity:0.08;
 z-index:0;
}

@keyframes bgMove{
 0%{transform:translate(0,0)}
 100%{transform:translate(-50%,-50%)}
}

/* ===== 🔐 LOGIN ===== */
#loginScreen{
 position:fixed;
 inset:0;
 background:#000c;
 display:flex;
 align-items:center;
 justify-content:center;
 z-index:999;
}

.login-card{
 background:rgba(15,23,42,0.9);
 padding:25px;
 border-radius:12px;
 width:300px;
 text-align:center;
 backdrop-filter:blur(10px);
 box-shadow:0 0 30px #000;
}

.login-card input{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:6px;
 border:none;
}

.login-card button{
 width:100%;
 margin-top:10px;
 background:#22c55e;
}

/* ===== HEADER ===== */
.main-title{
 text-align:center;
 font-size:28px;
 font-weight:800;
 margin-bottom:15px;
 letter-spacing:2px;
 background:linear-gradient(90deg,#0ea5e9,#6366f1,#ec4899);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
 text-shadow:0 0 20px rgba(14,165,233,0.5);
}

#app{
 position:relative;
 z-index:2;
}

/* 🔥 ตัวเทพ กระพริบ */
.top-pattern{
 animation: blinkGlow 1s infinite;
 border:1px solid #ffd700 !important;
 box-shadow:0 0 10px #ffd700, 0 0 20px #ffd700;
}

@keyframes blinkGlow{
 0%{opacity:1}
 50%{opacity:0.4}
 100%{opacity:1}
}

.pred-circle.P{ background:var(--p-color); color:#fff; }
.pred-circle.B{ background:var(--b-color); color:#fff; }

.top-pred{
  width:34px; height:34px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:2px solid #ffd700;
  box-shadow:0 0 8px rgba(255,215,0,0.6);
  animation: glow16 0.8s infinite;
  z-index:10;
}

@keyframes glow16{
  0%{ transform:scale(1); box-shadow:0 0 6px rgba(255,215,0,0.3); }
  50%{ transform:scale(1.08); box-shadow:0 0 12px rgba(255,215,0,0.8); }
  100%{ transform:scale(1); box-shadow:0 0 6px rgba(255,215,0,0.3); }
}

.p-text{ color:var(--p-color) !important; font-weight:bold; }
.b-text{ color:var(--b-color) !important; font-weight:bold; }

/* =========================
   🚀 AI FLOATING WIDGET (NEW)
   ========================= */
.ai-floating-widget{
    position:fixed;
    top:20px;
    right:20px;
    width:200px;

    background:rgba(10,15,25,.05);

    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);

    /* ขอบชัดขึ้น */
    border:2px solid rgba(120,190,255,.45);

    border-radius:18px;
    padding:15px;

    /* ใช้ box-shadow แค่ชุดเดียว */
    box-shadow:
        0 0 0 1px rgba(255,255,255,.08),
        0 0 12px rgba(120,190,255,.18),
        0 4px 16px rgba(0,0,0,.20),
        inset 0 0 10px rgba(255,255,255,.04);

    display:flex;
    flex-direction:column;
    gap:10px;

    z-index:1000;
}
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.ai-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:13px;
    font-weight:900;

    color:#fff;

    letter-spacing:1px;

    text-shadow:
        0 1px 2px rgba(0,0,0,1),
        0 0 6px rgba(0,0,0,.95),
        0 0 12px rgba(0,0,0,.8);
}
.ai-pred-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 10px 0;
}
.ai-pred-val{

    font-size:50px;

    font-weight:900;

    line-height:1;

    letter-spacing:1px;

    text-shadow:
        0 0 12px currentColor,
        0 0 24px currentColor,
        0 2px 6px #000,
        0 0 12px rgba(0,0,0,.9);
}
.ai-conf-bar-container{

    height:8px;

    background:#1b2534;

    border-radius:999px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.05);

}

.ai-conf-bar {
  height: 100%;
  width: 0%;
  transition: width 0.5s ease, background 0.5s ease;
}
.ai-status{

    text-align:center;

    font-size:13px;

    font-weight:900;

    color:#fff;

    padding:8px 10px;

    border-radius:10px;

    letter-spacing:.5px;

    text-shadow:
        0 1px 2px rgba(0,0,0,1),
        0 0 8px rgba(0,0,0,.9);
}

.status-confirmed { color: #4caf50; background: rgba(76, 175, 80, 0.1); }
.status-wait { color: #ff9800; background: rgba(255, 152, 0, 0.1); }
.status-high-risk { color: #f44336; background: rgba(244, 67, 54, 0.1); }

.ai-conf-label{
    display:flex;
    justify-content:space-between;

    font-size:12px;
    font-weight:800;

    color:#fff;

    text-shadow:
        0 1px 2px rgba(0,0,0,1),
        0 0 6px rgba(0,0,0,.95);
}
#ai-conf-pct{
    font-size:14px;
    font-weight:900;
    color:#fff;

    text-shadow:
        0 1px 2px #000,
        0 0 8px rgba(0,0,0,.9);
}
</style>
</head>

<body>

<!-- 🚀 AI FLOATING WIDGET -->
<div id="aiWidget" class="ai-floating-widget" style="display:none">
<div class="ai-header">
    <span>AI วิเคราะห์</span>
    <span id="ai-ver">V2.1</span>
</div>
  <div class="ai-pred-box">
    <div id="ai-pred-val" class="ai-pred-val">-</div>
  </div>
<div class="ai-conf-label">
    <span>ความมั่นใจ</span>
    <span id="ai-conf-pct">0%</span>
  </div>
<div class="ai-conf-bar-container">
  <div id="ai-conf-bar" class="ai-conf-bar"></div>
</div>

<div style="
display:flex;
justify-content:space-between;
font-size:12px;
font-weight:800;
margin-top:4px;
color:#fff;
text-shadow:
0 1px 2px #000,
0 0 6px rgba(0,0,0,.9);
">
  <span>เสียงตรงกัน</span>
  <span id="ai-consensus">0 / 0</span>
</div>

<div id="ai-status" class="ai-status status-wait">กำลังวิเคราะห์...</div>
</div>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>LOGIN</h2>
    <input id="user" placeholder="User">
    <input id="pass" type="password" placeholder="Password">
    <label style="font-size:12px">
      <input type="checkbox" onclick="togglePass()"> แสดงรหัสผ่าน
    </label>
    <button onclick="login()">เข้าใช้งาน</button>
    <div id="loginMsg" style="color:red;margin-top:10px"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="main-title">AI 16 PATTERN SKILL</div>
  <div id="expireText" style="text-align:center; margin-bottom:10px; font-size:13px; color:#ff4d4d;"></div>

  <div class="layout">
    <div class="left-panel">
      <div class="box">
        <div class="header-title">BEAD ROAD</div>
        <div class="bead-scroll-area">
          <div class="bead-grid" id="bead-grid"></div>
        </div>
      </div>
      <div class="box">
        <div class="header-title">TOTAL</div>
        <div class="stat-row">
          <span>P: <span id="total-p">0</span></span>
          <span>B: <span id="total-b">0</span></span>
          <span>T: <span id="total-t">0</span></span>
          <span>ALL: <span id="total-all">0</span></span>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="controls">
        <button class="btn btn-p" onclick="addResult('P')">P</button>
        <button class="btn btn-b" onclick="addResult('B')">B</button>
        <button class="btn btn-t" onclick="addResult('T')">T</button>
        <button class="btn" style="background:#ff9800;color:#000" onclick="undo()">UNDO</button>
        <button class="btn" style="background:#607d8b" onclick="clearData()">CLEAR</button>
      </div>
      <div id="patterns-container" class="patterns-container"></div>
    </div>
  </div>
</div>

<script>
const EXPIRE_DATE = new Date("2026-08-05");

/* ===== LOGIN (API VERSION) ===== */
async function login(){

  const userInput = document.getElementById("user");
  const passInput = document.getElementById("pass");

  const loginMsg = document.getElementById("loginMsg");

  loginMsg.innerText = "กำลังตรวจสอบ...";

  try{

    const res = await fetch(
      "https://morning-block-55bb.havanalanna.workers.dev/?user="
      + encodeURIComponent(userInput.value)
      + "&pass=" + encodeURIComponent(passInput.value)
    );

    const data = await res.json();

    if(data.status==="ok"){

      history = [];
      patterns = [];

      document.getElementById("loginScreen").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("aiWidget").style.display="flex";

      if(data.expire){
        document.getElementById("expireText").innerText =
          "EXPIRE : " + data.expire;
      }

      init();
      updateUI();

      /* ตรวจ License ทุก 30 วินาที */
      const user = userInput.value;
      const pass = passInput.value;

      setInterval(async()=>{

        try{

          const r = await fetch(
            "https://morning-block-55bb.havanalanna.workers.dev/?user="
            + encodeURIComponent(user)
            + "&pass=" + encodeURIComponent(pass)
          );

          const j = await r.json();

          if(j.status!=="ok"){
            alert("⛔ License ถูกปิดใช้งาน");
            location.reload();
          }

        }catch(e){
          console.log("License Check Error");
        }

      },30000);

    }else{

      loginMsg.innerText="❌ User หรือ Password ไม่ถูกต้อง";

    }

  }catch(e){

    loginMsg.innerText="❌ ไม่สามารถเชื่อมต่อ License Server";

  }

}

document.getElementById("expireText").innerText = "EXPIRE: " + EXPIRE_DATE.toLocaleDateString("th-TH");

function togglePass(){
 const p = document.getElementById("pass");
 p.type = (p.type==="password") ? "text":"password";
}

const PATTERNS=[
"PPPP","PPPB","PPBP","PPBB",
"PBPP","PBPB","PBBP","PBBB",
"BPPP","BPPB","BPBP","BPBB",
"BBPP","BBPB","BBBP","BBBB"
];

let history=[];
let patterns=[];

function init(){
 const box=document.getElementById("patterns-container");
 box.innerHTML="";
 patterns=[];

 PATTERNS.forEach((code,i)=>{
  const id=i+1;
  patterns.push({
   id,
   code,
   step:0,
   stats:{p:0,b:0,t:0,total:0,win:0},
   currentPrediction:null,
   results:[],
   winStreak: 0
  });

  const el=document.createElement("div");
  el.className="pattern-row";
  el.innerHTML=`
    <div>${code}</div>
    <div id="dots-${id}"
style="
display:grid;
gap:2px;
align-content:start;
">
</div>
    <div id="pct-${id}">0%</div>
    <div class="pred-circle" id="pred-${id}">-</div>
  `;
  box.appendChild(el);
 });
 renderBeadRoad();
}

function recalcAll(){
 patterns.forEach(p=>{
  p.step = 0;
  p.results = [];
  p.stats = {p:0,b:0,t:0,total:0,win:0};
  p.currentPrediction = null;
  p.winStreak = 0;
 });

 history.forEach(r=>{
  patterns.forEach(p=>{
    const expect = p.code[p.step];
    const isWin = (r === expect);
    p.results.push(isWin ? 'W' : 'L');
    if(isWin) {
      p.stats.win++;
      p.winStreak++;
    } else {
      p.winStreak = 0;
    }
    if(r==="P") p.stats.p++;
    else if(r==="B") p.stats.b++;
    else p.stats.t++;
    p.stats.total++;
    p.step = (p.step + 1) % p.code.length;
    p.currentPrediction = p.code[p.step];
  });
 });
}

function addResult(r){
 history.push(r);
 recalcAll();
 updateUI();
}

function undo(){
 if(history.length === 0) return;
 history.pop();
 recalcAll();
 updateUI();
}

function updateUI(){
 const total = history.length;
 document.getElementById("total-p").innerText = history.filter(x=>x==="P").length;
 document.getElementById("total-b").innerText = history.filter(x=>x==="B").length;
 document.getElementById("total-t").innerText = history.filter(x=>x==="T").length;
 document.getElementById("total-all").innerText = total;

 renderBeadRoad();

 let maxPct = 0;
 patterns.forEach(p => {
  const pct = p.stats.total ? Math.round((p.stats.win / p.stats.total) * 100) : 0;
  if (pct > maxPct) maxPct = pct;
 });

 // 🔥 AI MASTER LOGIC
let p_weight = 0;
let b_weight = 0;

let p_vote = 0;
let b_vote = 0;
 
 // ดึง 5 อันดับแรกที่แม่นยำที่สุดมาลงมติ (Consensus)
 let sortedPatterns = [...patterns].sort((a, b) => {
    const pctA = a.stats.total ? (a.stats.win / a.stats.total) : 0;
    const pctB = b.stats.total ? (b.stats.win / b.stats.total) : 0;
    return pctB - pctA;
 });

 let top5 = sortedPatterns.slice(0, 5);
top5.forEach(p => {

    const pct = p.stats.total ? (p.stats.win / p.stats.total) : 0;

    let weight = pct + (p.winStreak * 0.1);

    if (p.currentPrediction === "P"){

        p_weight += weight;
        p_vote++;

    }

    if (p.currentPrediction === "B"){

        b_weight += weight;
        b_vote++;

    }

});

 let total_weight = p_weight + b_weight;
 let confidence = 0;
 let ai_pred = "-";
 let status_text = "กำลังวิเคราะห์...";
 let status_class = "status-wait";

 if (total_weight > 0 && history.length >= 3) {
    if (p_weight > b_weight) {
        ai_pred = "P";
        confidence = Math.round((p_weight / total_weight) * 100);
    } else if (b_weight > p_weight) {
        ai_pred = "B";
        confidence = Math.round((b_weight / total_weight) * 100);
    }

    // ไม่โลกสวย: ถ้าความมั่นใจต่ำ หรือเสียงแตก ให้ SKIP
    if (confidence >= 80) {
        status_text = "สัญญาณชัด";
        status_class = "status-confirmed";
    } else if (confidence >= 60) {
        status_text = "เสี่ยงสูง";
        status_class = "status-high-risk";
    } else {
        status_text = "รอจังหวะ";
        status_class = "status-wait";
    }
 } else if (history.length < 3) {
    status_text = "ข้อมูลยังไม่พอ";
 }

 // อัปเดต Widget
 const widgetPred = document.getElementById("ai-pred-val");
 widgetPred.innerText = ai_pred;
 widgetPred.style.color = ai_pred === "P" ? "var(--p-color)" : (ai_pred === "B" ? "var(--b-color)" : "#fff");
 
 document.getElementById("ai-conf-pct").innerText = confidence + "%";
 const bar = document.getElementById("ai-conf-bar");
 bar.style.width = confidence + "%";
 bar.style.background = ai_pred === "P" ? "var(--p-color)" : "var(--b-color)";
 
 const statusEl = document.getElementById("ai-status");
 statusEl.innerText = status_text;
 statusEl.className = "ai-status " + status_class;
 
 const consensusEl = document.getElementById("ai-consensus");

if(ai_pred === "P"){

    consensusEl.innerText = p_vote + " / " + top5.length;

}else if(ai_pred === "B"){

    consensusEl.innerText = b_vote + " / " + top5.length;

}else{

    consensusEl.innerText = "0 / " + top5.length;

}

 // อัปเดต Pattern List เดิม
 patterns.forEach(pat => {
  const pct = pat.stats.total ? Math.round((pat.stats.win / pat.stats.total) * 100) : 0;
  const row = document.getElementById(`pct-${pat.id}`).parentElement;
  row.classList.remove("top-pattern");
  if (pct === maxPct && pct > 0) row.classList.add("top-pattern");

  document.getElementById(`pct-${pat.id}`).innerText = pct + "%";
  const predEl = document.getElementById(`pred-${pat.id}`);
  const val = pat.currentPrediction || "-";
  predEl.innerText = val;
  predEl.classList.remove("top-pred", "p-text", "b-text");
  if (val === "P") predEl.classList.add("p-text");
  if (val === "B") predEl.classList.add("b-text");
  if (pct === maxPct && pct > 0) predEl.classList.add("top-pred");

const dots = document.getElementById(`dots-${pat.id}`);

if(window.innerWidth < 768){
    dots.style.gridTemplateColumns = "repeat(6,12px)";
}else{
    dots.style.gridTemplateColumns = "repeat(10,12px)";
}

dots.style.gridAutoRows = "12px";
dots.style.gridAutoFlow = "row";     // เพิ่ม
dots.style.alignContent = "start";   // เพิ่ม
dots.innerHTML = "";

// แสดงเฉพาะผลล่าสุด
const showResults = pat.results;

const cols = window.innerWidth < 768 ? 6 : 10;

dots.style.gridTemplateColumns = `repeat(${cols},12px)`;

const rows = Math.ceil(showResults.length / cols);

dots.style.gridTemplateRows = `repeat(${rows},12px)`;

showResults.forEach(r => {
const d = document.createElement("div");
d.style.width = "12px";
d.style.height = "12px";
d.style.fontSize = "9px";
d.style.display = "flex";
d.style.alignItems = "center";
d.style.justifyContent = "center";
d.style.borderRadius = "3px";

if (r === "W") {
    d.style.background = "#ffd700";
    d.style.color = "#000";
    d.innerText = "✔";
} else {
    d.style.background = "#444";
    d.style.color = "#888";
    d.innerText = "X";
}

dots.appendChild(d);
});

dots.scrollLeft = dots.scrollWidth;
 });
}


function clearData(){
 if(!confirm("ล้างข้อมูลทั้งหมด?")) return;
 history = [];
 recalcAll();
 updateUI();
}

function renderBeadRoad(){

    const grid = document.getElementById("bead-grid");
    const area = document.querySelector(".bead-scroll-area");

    grid.innerHTML = "";

    const rows = 6;
    const cols = Math.ceil(history.length / rows) || 1;

    // ✅ ขนาดคงที่
    const cell = window.innerWidth < 768 ? 24 : 38;

    // ตั้งค่า Grid
    grid.style.gridTemplateRows = `repeat(${rows}, ${cell}px)`;
    grid.style.gridAutoColumns = `${cell}px`;

    // ให้ Grid กว้างตามจำนวนคอลัมน์
    grid.style.width = "max-content";

    for(let i = 0; i < rows * cols; i++){

        const d = document.createElement("div");
        d.className = "bead";

        d.style.width = cell + "px";
        d.style.height = cell + "px";
        d.style.fontSize = Math.max(10, cell * 0.4) + "px";

        if(i < history.length){

            const v = history[i];

            if(v === "P") d.classList.add("b-p");
            else if(v === "B") d.classList.add("b-b");
            else d.classList.add("b-t");

            d.innerText = v;

        }else{
            d.classList.add("b-empty");
        }

        grid.appendChild(d);
    }

    // ✅ เลื่อนไปคอลัมน์ล่าสุดอัตโนมัติ
    area.scrollLeft = area.scrollWidth;
}

init();
updateUI();
</script>
</body>
</html>
